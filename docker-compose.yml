version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://hermes-agent:8642/v1
      - OPENAI_API_KEY=${TELEGRAM_BOT_TOKEN}
      - WEBHOOK_URL_TELEGRAM=https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage
      - WEBHOOK_TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    restart: unless-stopped

  hermes-agent:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./hermes-data:/root/.hermes
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${TELEGRAM_BOT_TOKEN}
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
    command: sh -c "npm install -g hermes-agent && hermes gateway"
    ports:
      - "8642:8642"
    restart: unless-stopped

  telegram-bot:
    image: realsidsun/openwebui-telegram
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_USERNAME=${OPENWEBUI_USERNAME}
      - OPENWEBUI_PASSWORD=${OPENWEBUI_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - open-webui
    restart: unless-stopped

volumes:
  open-webui-data:
